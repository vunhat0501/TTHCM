<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ôn tập Tư tưởng Hồ Chí Minh</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="app-container">
            <h1>Ôn Tập TTHCM</h1>

            <div id="quiz-container" class="card">
                <h2 id="question-text">Đang tải câu hỏi...</h2>
                <div id="options-container"></div>
                <button id="next-btn" class="hidden">Câu tiếp theo</button>
            </div>

            <div id="result-container" class="card hidden">
                <h2>Kết quả của bạn</h2>
                <p id="score-text"></p>
                <button id="restart-btn">Làm lại từ đầu</button>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
